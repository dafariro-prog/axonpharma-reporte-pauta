name: Refresco reporte de pauta Axon Pharma

on:
  schedule:
    # 10:00, 11:00 y 13:00 hora Colombia (UTC-5) = 15:00, 16:00 y 18:00 UTC
    - cron: "0 15,16,18 * * *"
  workflow_dispatch: {}   # correr manual desde la pestaña Actions

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Refrescar data (Meta + TikTok + creativos + adsets)
        env:
          WINDSOR_API_KEY: ${{ secrets.WINDSOR_API_KEY }}
        run: node refresh.js

      - name: Commit si hubo cambios
        run: |
          git config user.name  "axon-report-bot"
          git config user.email "actions@github.com"
          git add data/meta.json data/tiktok.json data/creatives.json data/adsets.json
          if git diff --staged --quiet; then
            echo "Sin cambios en la data."
          else
            git commit -m "chore: refresco data $(date -u +'%Y-%m-%d %H:%M')"
            git push
          fi
